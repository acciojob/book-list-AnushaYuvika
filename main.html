<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<h1>MyBookList</h1>
	<div class="form-group">
		<form id="book-form">
			<label for="title">Title</label>
			<input id="title">
			<label for="author">Author</label>
			<input id="author">
			<label>ISBN#</label>
			<input id="isbn">
			<button class="delete">Add Book</button>
		</form>
	</div>

	<table id="table">
		<thead>
			<tr>
				<th>Title</th>
				<th>Author</th>
				<th>ISBN#</th>
			</tr>
		</thead>
		<tbody id="book-list"></tbody>
	</table>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
